# Sveltia CMS schema for ai.with.aj
#
# Dumbified on purpose. Three collections, each edits ONE small JSON file with
# the minimum fields. Changing something here commits to GitHub; Vercel
# redeploys within ~60 seconds.
#
# For anything NOT in this form (bio, curriculum, hero copy, etc.):
# edit src/content/site.json directly on GitHub.

backend:
  name: github
  repo: amaalgharaballi/ai-with-aj
  branch: main
  base_url: https://sveltia-cms-auth.amaalgharaballi.workers.dev

commit_messages:
  create: "content: update {{collection}}"
  update: "content: update {{collection}}"
  delete: "content: delete {{collection}}"
  uploadMedia: "content: upload {{path}}"
  deleteMedia: "content: delete {{path}}"

media_folder: public/uploads
public_folder: /uploads

locale: en

collections:
  # ─────────────────────────────────────────────────────────
  # 1. COHORT — dates, venue, description, per-day schedule. Most-edited.
  # ─────────────────────────────────────────────────────────
  - name: cohort
    label: "Next cohort"
    description: "The next workshop. Changing dates, times, or tools here auto-updates the countdown, tool marquee, hours totals, and day cards on the homepage."
    editor: { preview: false }
    files:
      - name: details
        label: "Workshop details"
        file: src/content/cohort.json
        fields:
          - name: startIso
            label: "Workshop start (date + time)"
            widget: datetime
            format: "YYYY-MM-DDTHH:mm:ssZ"
            picker_utc: false
            hint: "Kuwait time. First day of the workshop."
          - name: endIso
            label: "Workshop end (date + time)"
            widget: datetime
            format: "YYYY-MM-DDTHH:mm:ssZ"
            picker_utc: false
            hint: "Kuwait time. Last day of the workshop. The date label on the homepage is built from start + end automatically."
          - name: venueAr
            label: "Venue (Arabic)"
            widget: string
            hint: "Example: فندق أرابيلا البدع · قاعة ليان"
          - name: descriptionAr
            label: "Workshop description (Arabic)"
            widget: text
            hint: "Short paragraph shown in the 'About the workshop' section."
          - name: days
            label: "Workshop days"
            widget: list
            summary: "{{fields.titleAr}}  ·  {{fields.startTime}}–{{fields.endTime}}"
            hint: "Each day becomes a curriculum card. The tools listed here auto-fill the tool marquee, and the total hours auto-propagate to the hero, stats, and pricing."
            fields:
              - name: titleAr
                label: "Day title (Arabic)"
                widget: string
                hint: "Example: اليوم الأول · توليد الصور"
              - name: bodyAr
                label: "Day description (Arabic)"
                widget: text
              - name: startTime
                label: "Start time"
                widget: string
                pattern: ['^\d{2}:\d{2}$', "Use 24-hour format, e.g. 18:00"]
                hint: "24-hour format. Example: 18:00"
              - name: endTime
                label: "End time"
                widget: string
                pattern: ['^\d{2}:\d{2}$', "Use 24-hour format, e.g. 21:00"]
                hint: "24-hour format. Example: 21:00"
              - name: tools
                label: "Tools taught this day"
                widget: list
                field: { name: name, label: "Tool name", widget: string }
                hint: "One tool per entry. Example: Veo 3.1, Sora 2, Kling AI. These auto-populate the tool marquee."

  # ─────────────────────────────────────────────────────────
  # 2. PRICING — prices + seats-left counter.
  # ─────────────────────────────────────────────────────────
  - name: pricing
    label: "Pricing"
    description: "Tier prices and the early-bird seats-left counter."
    editor: { preview: false }
    files:
      - name: prices
        label: "Prices & seats"
        file: src/content/pricing.json
        fields:
          - name: earlyBirdPrice
            label: "Early bird price (KWD)"
            widget: number
            value_type: int
          - name: standardPrice
            label: "Standard price (KWD)"
            widget: number
            value_type: int
          - name: earlyBirdSoldOut
            label: "Early bird sold out?"
            widget: boolean
            default: false
            hint: "Toggle ON when the early-bird tier is full. A 'مكتمل' badge appears on the pricing card."

  # ─────────────────────────────────────────────────────────
  # 3. FAQ — questions and answers.
  # ─────────────────────────────────────────────────────────
  - name: faq
    label: "FAQ"
    description: "Questions shown in the FAQ accordion at the bottom of the page."
    editor: { preview: false }
    files:
      - name: list
        label: "Questions"
        file: src/content/faq.json
        fields:
          - name: faq
            label: "Questions"
            widget: list
            summary: "{{fields.qAr}}"
            fields:
              - { name: qAr, label: "Question (Arabic)", widget: string }
              - { name: aAr, label: "Answer (Arabic)", widget: text }
              - { name: qEn, label: "Question (English)", widget: string, required: false }
              - { name: aEn, label: "Answer (English)", widget: text, required: false }
